meters:
- name: plan_subscription
  description: Flat monthly plan fee for the chosen Orama Cloud tier (Free, Pro, Premium, Enterprise).
  unit: plan
  aggregation: max
  dimensions:
  - account
  - plan
- name: index_updates
  description: Successful index deployments consumed against the plan's monthly index-update quota.
  unit: deployments
  aggregation: sum
  dimensions:
  - account
  - index
- name: search_queries
  description: Search queries served (unlimited on all plans; tracked for usage visibility, not billed per query).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - index
- name: answer_sessions
  description: Answer (RAG) sessions served (unlimited on all plans; tracked for usage visibility).
  unit: sessions
  aggregation: sum
  dimensions:
  - account
  - index
- name: oss_self_hosted_compute
  description: Infrastructure cost (compute/memory) of self-hosting the open-source Orama engine; not an Orama vendor charge.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - environment
principles:
- name: Visibility
  description: Track index-update consumption against plan quota and monitor search/answer usage in the Orama Cloud analytics dashboard.
- name: Allocation
  description: Map indexes and API keys to workloads/teams; attribute the flat plan fee to the owning cost center.
- name: Optimization
  description: Right-size the plan to actual index-update and retention needs; self-host the OSS engine where managed hosting is unnecessary; batch document changes before deploying to conserve index-update quota.
- name: Accountability
  description: Assign an owner per index/project; review plan tier and quota headroom monthly.
