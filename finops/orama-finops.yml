description: >-
  FinOps view of Orama spend. Orama Cloud uses a flat-fee, plan-based model
  (Free, Pro, Premium, Enterprise) rather than per-query metering - search
  queries, embeddings, and answer sessions are unlimited across plans. The
  cost-relevant dimensions are the plan tier and its quotas (index updates,
  analytics retention, segments, triggers). The open-source Orama engine is
  Apache 2.0 and self-hosted, so its cost is infrastructure (compute/memory)
  rather than a vendor charge.
notes: >-
  Exact Pro/Premium/Enterprise prices are not published; treat them as
  flat-fee / contact-sales. Verify against the Orama pricing page during
  reconciliation.
